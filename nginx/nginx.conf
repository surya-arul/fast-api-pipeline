events {
    worker_connections 1024;
}

http {
    # Rate limiting zone — 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Connection timeout settings
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    upstream fastapi {
        server fastapi:8100;
        keepalive 32;           # reuse connections to FastAPI
    }

    server {
        listen 80;

        # Hide nginx version from attackers
        server_tokens off;

        # Health check — no rate limit on this
        location /health {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
        }

        # API routes
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://fastapi;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # CORS headers (useful for frontend apps)
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        }

        # Root
        location / {
            proxy_pass         http://fastapi;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Block hidden files like .env, .git
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}